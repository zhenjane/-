<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>解 xyz 方程式</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main>
    <h1>解 xyz 方程式</h1>
    <p>輸入三個一次方程式，按一下「計算」即可得到 x、y、z 的解、詳細步驟與數線。</p>

    <section class="card">
      <h2>方程式輸入</h2>
      <div class="equation-grid">
        <div>
          <label>方程式 1</label>
          <div class="inputs">
            <input type="number" id="a1" value="1" /> x +
            <input type="number" id="b1" value="1" /> y +
            <input type="number" id="c1" value="1" /> z =
            <input type="number" id="d1" value="12" />
          </div>
        </div>
        <div>
          <label>方程式 2</label>
          <div class="inputs">
            <input type="number" id="a2" value="1" /> x +
            <input type="number" id="b2" value="-1" /> y +
            <input type="number" id="c2" value="0" /> z =
            <input type="number" id="d2" value="2" />
          </div>
        </div>
        <div>
          <label>方程式 3</label>
          <div class="inputs">
            <input type="number" id="a3" value="1" /> x +
            <input type="number" id="b3" value="0" /> y +
            <input type="number" id="c3" value="-1" /> z =
            <input type="number" id="d3" value="4" />
          </div>
        </div>
      </div>
      <button id="solveButton">計算</button>
    </section>

    <section class="card" id="resultSection">
      <h2>解答與步驟</h2>
      <div id="steps"></div>
      <div id="solution"></div>
      <div id="numberLine"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
