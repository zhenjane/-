<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>多功能方程式求解與幾何視覺化平台</title>
  <!-- 引入 Google Fonts 'Outfit' 提升字體美感 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- 引入 Chart.js 用于 2D 折線與曲線圖表 -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- 引入 Plotly.js 用于 3D 空間立體幾何圖表 -->
  <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>

  <!-- 引入外部樣式表，使結構與樣式分離以利於管理 -->
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <!-- 網頁頂部頁首：整合楠梓高中校徽與標題資訊 -->
    <header class="page-header">
      <div class="logo-container">
        <img src="logo.png" alt="高雄市立楠梓高級中學 校徽" class="school-logo">
      </div>
      <div class="header-text">
        <h1>多功能方程式求解與幾何分析平台</h1>
        <p class="subtitle">支援一元一次、二元聯立與三元聯立方程式求解，並提供互動式 2D/3D 幾何圖形展示。</p>
      </div>
    </header>

    <!-- 方程式類型選擇頁籤 -->
    <div class="tabs">
      <button class="tab-btn" id="tab1" onclick="switchEquationType(1)">一元一次</button>
      <button class="tab-btn" id="tab2" onclick="switchEquationType(2)">二元一次聯立</button>
      <button class="tab-btn active" id="tab3" onclick="switchEquationType(3)">三元一次聯立</button>
    </div>

    <!-- 方程式輸入面板 -->
    <section class="card">
      <h2>方程式輸入</h2>
      <div id="equationInputsContainer">
        <!-- 由 JavaScript 動態生成輸入欄位 -->
      </div>
      <button class="solve-btn" id="solveButton">計算與繪製圖表</button>
    </section>

    <!-- 計算解答與圖表視覺化面板 -->
    <section class="card" id="resultSection">
      <h2>解答與解題步驟</h2>
      <div id="steps"></div>
      <div id="solution"></div>
      
      <!-- 圖表控制面板 -->
      <div class="chart-controls" id="chartControls" style="display: none;">
        <h3>圖表幾何分析</h3>
        <div class="controls-row">
          <div class="control-group" id="chartModeGroup">
            <label for="chartModeSelect">圖表展示模式：</label>
            <select id="chartModeSelect">
              <!-- 由 JavaScript 依據方程式模式動態填入 -->
            </select>
          </div>
          <div class="control-group" id="variableSelectGroup" style="display: none;">
            <label for="chartVarSelect">觀察自變數 (X 軸)：</label>
            <select id="chartVarSelect">
              <option value="x">以 x 為變數 (固定 y, z 為解值)</option>
              <option value="y">以 y 為變數 (固定 x, z 為解值)</option>
              <option value="z">以 z 為變數 (固定 x, y 為解值)</option>
            </select>
          </div>
          <div class="control-group" id="projectionSelectGroup" style="display: none;">
            <label for="projectionSelect">投影平面：</label>
            <select id="projectionSelect">
              <option value="xy">X-Y 平面 (固定 z 為解值)</option>
              <option value="xz">X-Z 平面 (固定 y 為解值)</option>
              <option value="yz">Y-Z 平面 (固定 x 為解值)</option>
            </select>
          </div>
        </div>
      </div>
      
      <!-- 2D 與 3D 圖表渲染容器 -->
      <div class="chart-container" id="chartContainer" style="display: none;">
        <!-- 2D 圖表 Canvas (Chart.js) -->
        <canvas id="equationChart" style="width: 100%; height: 100%;"></canvas>
        <!-- 3D 圖表 Div (Plotly.js) -->
        <div id="plotlyChart" style="width: 100%; height: 100%; display: none;"></div>
      </div>
    </section>
  </main>

  <!-- 引入主要的方程式求解與圖表渲染邏輯 -->
  <script src="script.js"></script>
</body>
</html>
